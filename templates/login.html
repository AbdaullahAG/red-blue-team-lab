<!DOCTYPE html>
<html>
<head><title>Login</title>
<style>
body { font-family: Arial; margin: 40px; background: #f0f0f0; }
.container { background: white; padding: 30px; border-radius: 8px; max-width: 400px; margin: auto; }
input, button { margin: 10px 0; padding: 8px; width: 100%; }
button { background: #cc0000; color: white; border: none; border-radius: 4px; cursor: pointer; }
.msg { font-weight: bold; padding: 10px; border-radius: 4px; }
.success { color: green; background: #e8f5e9; }
.error { color: red; background: #ffebee; }
a { color: #333; }
</style>
</head>
<body>
    <div class="container">
        <h2>🔑 Login</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Username">
            <input type="password" name="password" placeholder="Password">
            <button type="submit">Login</button>
        </form>
        {% if msg %}
        <p class="msg {{ 'success' if 'Welcome' in msg else 'error' }}">{{ msg }}</p>
        {% endif %}
        <a href="/">← Back</a>
    </div>
</body>
</html>
