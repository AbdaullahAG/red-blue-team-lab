<!DOCTYPE html>
<html>
<head><title>Ping Tool</title>
<style>
body { font-family: Arial; margin: 40px; background: #f0f0f0; }
.container { background: white; padding: 30px; border-radius: 8px; max-width: 600px; margin: auto; }
input, button { margin: 10px 0; padding: 8px; width: 100%; }
button { background: #cc0000; color: white; border: none; border-radius: 4px; cursor: pointer; }
pre { background: #111; color: #0f0; padding: 15px; border-radius: 4px; overflow-x: auto; }
a { color: #333; }
</style>
</head>
<body>
    <div class="container">
        <h2>💻 Ping Tool</h2>
        <form method="POST">
            <input type="text" name="host" placeholder="Enter IP or hostname (e.g. 127.0.0.1)">
            <button type="submit">Ping</button>
        </form>
        {% if output %}<pre>{{ output }}</pre>{% endif %}
        <a href="/">← Back</a>
    </div>
</body>
</html>
