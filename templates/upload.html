<!DOCTYPE html>
<html>
<head><title>File Upload</title>
<style>
body { font-family: Arial; margin: 40px; background: #f0f0f0; }
.container { background: white; padding: 30px; border-radius: 8px; max-width: 600px; margin: auto; }
input, button { margin: 10px 0; padding: 8px; }
button { background: #cc0000; color: white; border: none; border-radius: 4px; cursor: pointer; }
.msg { color: green; font-weight: bold; }
a { color: #333; }
</style>
</head>
<body>
    <div class="container">
        <h2>📁 File Upload</h2>
        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file"><br>
            <button type="submit">Upload</button>
        </form>
        {% if msg %}<p class="msg">{{ msg }}</p>{% endif %}
        <a href="/">← Back</a>
    </div>
</body>
</html>
